site_name: Claude Code for Research
site_description: A hands-on workshop for researchers at SPL Lab, BGU
site_author: Omer Eliyahu
# site_url and repo_url to be set when published

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Module 0 — Why this course: module-00-framing.md
  - Module 1 — Setup & mental model: module-01-setup.md
  - Module 2 — Repo-friendly: module-02-claude-md.md
  - Module 3 — Daily workflows: module-03-workflows.md
  - Module 4 — Slash commands: module-04-slash-commands.md
  - Module 5 — Failure modes: module-05-failure-modes.md
  - Module 6 — Case studies: module-06-case-studies.md

# Teacher notes are intentionally not in nav. They're linkable via direct URL.
# not_in_nav keeps `mkdocs build --strict` from failing on these unlisted pages.
not_in_nav: |
  /teacher-notes/**

plugins:
  - search
